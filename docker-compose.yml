x-app-build: &app-build
  context: .
  args:
    EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobmatcher}
      POSTGRES_USER: ${POSTGRES_USER:-jobmatcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobmatcher}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobmatcher} -d ${POSTGRES_DB:-jobmatcher}"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    build: *app-build
    depends_on:
      postgres:
        condition: service_healthy
    environment: &common-env
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-jobmatcher}:${POSTGRES_PASSWORD:-jobmatcher}@postgres:5432/${POSTGRES_DB:-jobmatcher}}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-jobmatcher}:${POSTGRES_PASSWORD:-jobmatcher}@postgres:5432/${POSTGRES_DB:-jobmatcher}}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change-me}
      PYTHONPATH: /opt/project/src
      PLAYWRIGHT_BROWSERS_PATH: /home/airflow/.cache/ms-playwright
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
    volumes:
      - .:/opt/project
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -lc "
      airflow db migrate &&
      (
      airflow users create
      --role Admin
      --username ${AIRFLOW_USERNAME:-admin}
      --password ${AIRFLOW_PASSWORD:-admin}
      --firstname Airflow
      --lastname Admin
      --email admin@example.com || true
      )
      "

  airflow-webserver:
    build: *app-build
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *common-env
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/project
      - airflow_logs:/opt/airflow/logs

  airflow-scheduler:
    build: *app-build
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *common-env
    command: scheduler
    volumes:
      - .:/opt/project
      - airflow_logs:/opt/airflow/logs

  airflow-startup-trigger:
    build: *app-build
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      airflow-scheduler:
        condition: service_started
    environment: *common-env
    command: ["bash", "/opt/project/scripts/trigger_startup_dags.sh"]
    volumes:
      - .:/opt/project
      - airflow_logs:/opt/airflow/logs

  streamlit:
    build: *app-build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-jobmatcher}:${POSTGRES_PASSWORD:-jobmatcher}@postgres:5432/${POSTGRES_DB:-jobmatcher}}
      PYTHONPATH: /opt/project/src
      PLAYWRIGHT_BROWSERS_PATH: /home/airflow/.cache/ms-playwright
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
    entrypoint: ["python", "-m", "streamlit", "run"]
    command: ["streamlit_app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    ports:
      - "8501:8501"
    volumes:
      - .:/opt/project

volumes:
  postgres_data:
  airflow_logs:
